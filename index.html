<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>超级玛丽 - Super Mario</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Courier New', monospace;
      }
      #game-container {
        position: relative;
      }
      canvas {
        display: block;
      }

      #custom-asset-panel {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      }

      .panel-container {
        background: #1a1a2e;
        border-radius: 12px;
        width: 90%;
        max-width: 800px;
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        border: 1px solid #333;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 24px;
        border-bottom: 1px solid #333;
      }

      .panel-header h2 {
        color: #fff;
        font-size: 22px;
        font-weight: 600;
      }

      .close-btn {
        background: none;
        border: none;
        color: #888;
        font-size: 28px;
        cursor: pointer;
        padding: 0;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        transition: all 0.2s;
      }

      .close-btn:hover {
        background: #333;
        color: #fff;
      }

      .panel-tabs {
        display: flex;
        gap: 4px;
        padding: 12px 24px;
        border-bottom: 1px solid #333;
        flex-wrap: wrap;
      }

      .tab-btn {
        background: #2a2a4a;
        border: none;
        color: #aaa;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }

      .tab-btn:hover {
        background: #3a3a5a;
        color: #fff;
      }

      .tab-btn.active {
        background: #e52521;
        color: #fff;
      }

      .panel-content {
        flex: 1;
        overflow-y: auto;
        padding: 16px 24px;
      }

      .panel-content::-webkit-scrollbar {
        width: 8px;
      }

      .panel-content::-webkit-scrollbar-track {
        background: #1a1a2e;
      }

      .panel-content::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 4px;
      }

      .asset-item {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px;
        background: #252540;
        border-radius: 8px;
        margin-bottom: 10px;
        transition: background 0.2s;
      }

      .asset-item:hover {
        background: #2d2d4a;
      }

      .asset-preview {
        width: 64px;
        height: 64px;
        background: #1a1a2e;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        overflow: hidden;
        border: 1px solid #333;
      }

      .preview-placeholder {
        color: #666;
        font-size: 12px;
      }

      .preview-image {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      .asset-info {
        flex: 1;
        min-width: 0;
      }

      .asset-name {
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .asset-category {
        color: #888;
        font-size: 12px;
        margin-bottom: 6px;
      }

      .asset-specs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .asset-specs span {
        background: #1a1a2e;
        color: #aaa;
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 4px;
      }

      .asset-actions {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex-shrink: 0;
      }

      .upload-btn {
        background: #4a6cf7;
        color: #fff;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        text-align: center;
        transition: background 0.2s;
      }

      .upload-btn:hover {
        background: #5a7cff;
      }

      .file-input {
        display: none;
      }

      .remove-btn {
        background: #333;
        border: 1px solid #555;
        color: #aaa;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
      }

      .remove-btn:hover {
        background: #c0392b;
        border-color: #c0392b;
        color: #fff;
      }

      .panel-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        border-top: 1px solid #333;
        gap: 12px;
      }

      .btn {
        padding: 10px 24px;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        border: none;
        font-weight: 500;
        transition: all 0.2s;
      }

      .btn-primary {
        background: #e52521;
        color: #fff;
      }

      .btn-primary:hover {
        background: #ff3530;
      }

      .btn-secondary {
        background: #333;
        color: #ddd;
        border: 1px solid #555;
      }

      .btn-secondary:hover {
        background: #444;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
